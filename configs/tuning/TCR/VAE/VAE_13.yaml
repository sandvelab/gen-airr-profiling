definitions:
  datasets:
    dataset:
      format: AIRR
      params:
        path: data.tsv
        is_repertoire: False
        paired: False
        region_type: IMGT_JUNCTION
        separator: "\t"
  ml_methods:
    model:
      SimpleVAE:
        batch_size: 64
        beta: 0.75
        locus: beta
        device: cpu
        latent_dim: 30
        linear_nodes_count: 25
        num_epochs: 500
        patience: 20
        pretrains: 10
        warmup_epochs: 20
        validation_split: 0.1
        learning_rate: 0.001
instructions:
  gen_model:
    type: TrainGenModel
    export_combined_dataset: False
    dataset: dataset
    method: model
    gen_examples_count: 130000
    number_of_processes: 1
    training_percentage: 1
