n_experiments: 1
output_dir: "RESULTS_NOV12/TCR"
input_dir: "data/experimental/collectionA"
seed: 42

data_generation:
  experimental: True
  method: "experimental"
  n_samples: 21500
  default_model_name: "humanTRB"
  input_columns: ["junction_aa", "v_call", "j_call", "locus"]

models:
    - name: "VAE04"
      immuneml_model_config: "configs/generative_models/TCR/VAE/VAE04.yaml"
      train_dir: "train"
      test_dir: "test"
      n_subset_samples: 21500
    - name: "VAE24"
      immuneml_model_config: "configs/generative_models/TCR/VAE/VAE24.yaml"
      train_dir: "train"
      test_dir: "test"
      n_subset_samples: 21500

analyses:
    - name: "reduced_dimensionality"
      model_names: [ "VAE04", "VAE24" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      subfolder_name: "all VAE models"
    - name: "memorization"
      model_names: [ "VAE04", "VAE24" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 6
      allowed_mismatches: 0
      indels: False
      subfolder_name: "all VAE models dist 0"
    - name: "memorization"
      model_names: [ "VAE04", "VAE24" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 6
      allowed_mismatches: 0
      indels: False
      deduplicate: True
      subfolder_name: "all VAE models dist 0 deduplicated"
    - name: "network"
      model_names: [ "VAE04", "VAE24" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 6
      subfolder_name: "all VAE models"
    - name: "precision_recall"
      model_names: [ "VAE04", "VAE24" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 6
      allowed_mismatches: 0
      indels: False
      subfolder_name: "all VAE models dist 0"
    - name: "precision_recall"
      model_names: [ "VAE04", "VAE24" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 6
      allowed_mismatches: 0
      indels: False
      deduplicate: True
      subfolder_name: "all VAE models dist 0 deduplicated"
    - name: "precision_recall"
      model_names: [ "VAE04", "VAE24" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 6
      allowed_mismatches: 1
      indels: True
      subfolder_name: "all VAE models dist 1"
