models:
    - name: "ProGen_overlap"
      immuneml_model_config: "configs/generative_models/TCR/ProGen/progen_18.yaml"
      train_dir: "train"
      test_dir: "test"
      n_subset_samples: 21500
    - name: "ProGen_kmer"
      immuneml_model_config: "configs/generative_models/TCR/ProGen/progen_32.yaml"
      train_dir: "train"
      test_dir: "test"
      n_subset_samples: 21500

analyses:
    - name: "reduced_dimensionality"
      model_names: [ "ProGen_overlap", "ProGen_kmer" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      subfolder_name: "all ProGen models"
    - name: "memorization"
      model_names: [ "ProGen_overlap", "ProGen_kmer" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 6
      allowed_mismatches: 0
      indels: False
      subfolder_name: "all ProGen models dist 0"
    - name: "memorization"
      model_names: [ "ProGen_overlap", "ProGen_kmer" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 6
      allowed_mismatches: 0
      indels: False
      deduplicate: True
      subfolder_name: "all ProGen models dist 0 deduplicated"
    - name: "network"
      model_names: [ "ProGen_overlap", "ProGen_kmer" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 6
      subfolder_name: "all ProGen models"
    - name: "precision_recall"
      model_names: [ "ProGen_overlap", "ProGen_kmer" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 6
      allowed_mismatches: 0
      indels: False
      subfolder_name: "all ProGen models dist 0"
    - name: "precision_recall"
      model_names: [ "ProGen_overlap", "ProGen_kmer" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 6
      allowed_mismatches: 0
      indels: False
      deduplicate: True
      subfolder_name: "all ProGen models dist 0 deduplicated"
    - name: "precision_recall"
      model_names: [ "ProGen_overlap", "ProGen_kmer" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 6
      allowed_mismatches: 1
      indels: True
      subfolder_name: "all ProGen models dist 1"
