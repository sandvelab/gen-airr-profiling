n_experiments: 2
output_dir: "results_dummy/experimental_umi"
input_dir: "data/experimental/dummy_umi"
seed: 42
data_generation:
  experimental: True
  method: "experimental_umi"
  n_samples: 1000
  default_model_name: "humanIGH"
  input_columns: ["junction_aa", "v_call", "j_call", "locus", "umi_count"]
models:
    - name: "vae"
      immuneml_model_config: "configs/dummy_generative_models/SimpleVAE.yaml"
      train_dir: "train"
      test_dir: "test"
      n_subset_samples: 100
    - name: "pwm"
      immuneml_model_config: "configs/dummy_generative_models/PWM.yaml"
      train_dir: "train"
      test_dir: "test"
      n_subset_samples: 100
    - name: "sonnia"
      immuneml_model_config: "configs/dummy_generative_models/SoNNia.yaml"
      train_dir: "train"
      test_dir: "test"
      n_subset_samples: 100
    - name: "lstm"
      immuneml_model_config: "configs/dummy_generative_models/SimpleLSTM.yaml"
      train_dir: "train"
      test_dir: "test"
      n_subset_samples: 100
analyses:
    - name: "memorization"
      model_names: [ "pwm", "vae" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 10
      allowed_mismatches: 1
      indels: True
      subfolder_name: "all dummy models dist 1"
      receptor_type: "TCR"
    - name: "reduced_dimensionality"
      model_names: [ "pwm", "vae" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 6
      subfolder_name: "dummy models"
      receptor_type: "TCR"
    - name: "diversity"
      model_names: [ "pwm", "vae" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 10
      subfolder_name: "dummy models"
      receptor_type: "TCR"
    - name: "phenotype"
      model_names: ["pwm"]
      default_model_name: "humanTRB"
      subfolder_name: "pwm"
      receptor_type: "TCR"
      allowed_mismatches: 0
      indels: False
    - name: "phenotype"
      model_names: ["sonnia"]
      default_model_name: "humanTRB"
      subfolder_name: "sonnia"
      receptor_type: "TCR"
      allowed_mismatches: 0
      indels: False
    - name: "phenotype"
      model_names: [ "vae" ]
      default_model_name: "humanTRB"
      subfolder_name: "vae"
      receptor_type: "BCR UMI"
      allowed_mismatches: 0
      indels: False
    - name: "network"
      model_names: [ "pwm", "vae" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 10
      allowed_mismatches: 1
      subfolder_name: "dummy models"
      receptor_type: "TCR"
    - name: "precision_recall"
      model_names: [ "vae" ]
      default_model_name: "humanTRB"
      reference_data: [ "train", "test" ]
      n_subsets: 1
      allowed_mismatches: 1
      indels: True
      subfolder_name: "all dummy models dist 1"
      receptor_type: "TCR"
    - name: "innovation_umi"
      model_names: [ "vae" ]
      default_model_name: "humanIGH"
      n_subsets: 1
      allowed_mismatches: 0
      indels: False
      subfolder_name: "all dummy models dist 0 elo elo"
      receptor_type: "BCR UMI"
    - name: "phenotype"
      model_names: [ "train" ]
      default_model_name: "humanIGH"
      subfolder_name: "train"
      allowed_mismatches: 0
      indels: False
      receptor_type: "BCR UMI"
    - name: "clone_frequencies"
      model_names: [ "vae" ]
      default_model_name: "humanIGH"
      reference_data: [ "train", "test" ]
      n_subsets: 10
      subfolder_name: "all models"
      receptor_type: "BCR UMI"
